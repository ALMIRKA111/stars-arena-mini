<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ШАПКА -->
        <div class="header">
            <div class="balance">
                <span class="balance-value" id="balance">0</span>
                <span class="balance-currency">⭐</span>
            </div>
            <div class="user" id="username">Загрузка...</div>
        </div>

        <!-- ЭКРАН PVP -->
        <div id="pvp-tab" class="tab-content" style="display: block;">
            <div class="bank">
                <div class="bank-label">БАНК</div>
                <div class="bank-value" id="bank-value">0</div>
                <div class="bank-currency">⭐</div>
            </div>

            <div class="players-section">
                <div class="players-header">
                    <span>#</span>
                    <span>Цвет</span>
                    <span>Шанс</span>
                </div>
                <div id="players-list" class="players-list">
                    <div class="empty-players">Пока нет ставок</div>
                </div>
            </div>

            <div class="bet-info" id="bet-info" style="display: none;">
                <span>Ставка: <span id="bet-amount-display">0</span>⭐</span>
                <span>Шанс: <span id="bet-percent-display">0</span>%</span>
                <span>Цвет: <span id="bet-color-display">Нет</span></span>
            </div>

            <div class="amount-input-group">
                <input type="number" id="bet-amount-input" class="amount-input" placeholder="Введи сумму ставки" min="1" step="1">
                <span class="input-currency">⭐</span>
            </div>

            <button class="ok-btn" id="ok-btn">ОК</button>
            <button class="place-btn" id="place-bet" style="display: none;">СДЕЛАТЬ СТАВКУ</button>
        </div>

        <!-- ЭКРАН ПРОФИЛЬ -->
        <div id="profile-tab" class="tab-content" style="display: none;">
            <div class="profile-card">
                <div class="profile-actions">
                    <button class="profile-action" id="deposit-btn">📥 Пополнить</button>
                    <button class="profile-action" id="withdraw-btn">📤 Вывести</button>
                </div>

                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-label">Баланс</div>
                        <div class="stat-value" id="profile-balance">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Всего игр</div>
                        <div class="stat-value" id="profile-games">0</div>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-label">Побед</div>
                        <div class="stat-value" id="profile-wins">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Процент</div>
                        <div class="stat-value" id="profile-winrate">0%</div>
                    </div>
                </div>

                <div class="profile-menu">
                    <button class="profile-menu-item" id="partner-btn">👥 Партнёрская программа</button>
                    <button class="profile-menu-item" id="support-btn">🆘 Поддержка</button>
                    <button class="profile-menu-item" id="promo-btn">🎁 Промокод</button>
                </div>
            </div>
        </div>

        <!-- НИЖНЯЯ НАВИГАЦИЯ -->
        <div class="bottom-nav">
            <button class="nav-btn active" id="pvp-btn">PVP</button>
            <button class="nav-btn" id="profile-btn">Профиль</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
