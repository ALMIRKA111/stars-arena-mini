<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0f1e;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
        }

        .header {
            background: #1a1f30;
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .balance {
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
        }

        .user {
            color: white;
            font-weight: 500;
        }

        .bottom-nav {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            background: #1a1f30;
            padding: 10px;
            border-radius: 30px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #8e9ab0;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
        }

        .nav-btn.active {
            background: #4a90e2;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .bank {
            background: linear-gradient(135deg, #2a2f45, #1a1f30);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #3a4055;
        }

        .bank-label {
            color: #8e9ab0;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .bank-value {
            font-size: 48px;
            color: #ffd700;
            font-weight: bold;
        }

        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto 30px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #2a2f45;
            border: 4px solid #4a90e2;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.3);
            transition: transform 6s cubic-bezier(0.25, 0.1, 0.15, 1);
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            color: #ffd700;
            z-index: 10;
            filter: drop-shadow(0 0 5px gold);
        }

        .players-section {
            background: #1a1f30;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
        }

        .players-header {
            display: grid;
            grid-template-columns: 40px 1fr;
            padding: 10px;
            color: #8e9ab0;
            font-size: 12px;
            border-bottom: 1px solid #2a2f45;
        }

        .players-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .player-item {
            display: grid;
            grid-template-columns: 40px 1fr;
            padding: 10px;
            color: white;
            font-size: 14px;
            border-bottom: 1px solid #2a2f45;
        }

        .player-item.you {
            background: #2a3a55;
            border-radius: 8px;
        }

        .bet-info {
            background: #2a3a55;
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
            justify-content: space-around;
            font-size: 16px;
        }

        .input-group {
            margin: 15px 0;
        }

        .amount-input {
            width: 100%;
            padding: 15px;
            background: #1a1f30;
            border: 2px solid #2a2f45;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .amount-input:focus {
            border-color: #4a90e2;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: #4a90e2;
            color: white;
        }

        .btn-secondary {
            background: #2a2f45;
            color: white;
            border: 1px solid #4a90e2;
        }

        .profile-card {
            background: #1a1f30;
            padding: 20px;
            border-radius: 20px;
        }

        .profile-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-item {
            background: #0f1425;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-label {
            color: #8e9ab0;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
        }

        .menu-item {
            background: #0f1425;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            text-align: left;
            border: none;
            color: white;
            width: 100%;
            font-size: 16px;
        }

        .wallet-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0f1e;
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        .wallet-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wallet-header h2 {
            font-size: 20px;
            font-weight: normal;
        }

        .payment-methods {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }

        .method-btn {
            flex: 1;
            padding: 15px;
            background: #1a1f30;
            border: 2px solid #2a2f45;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        .method-btn.active {
            background: #4a90e2;
            border-color: #4a90e2;
        }

        .amount-section {
            margin-bottom: 40px;
        }

        .amount-label {
            color: #8e9ab0;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .amount-input-wrapper {
            position: relative;
            width: 100%;
        }

        .amount-input {
            width: 100%;
            padding: 20px 60px 20px 20px;
            background: #1a1f30;
            border: 2px solid #2a2f45;
            border-radius: 15px;
            color: white;
            font-size: 24px;
            text-align: left;
        }

        .amount-input:focus {
            border-color: #4a90e2;
            outline: none;
        }

        .amount-currency {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #4a90e2;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .withdraw-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0f1e;
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        .result-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .result-content {
            background: #1a1f30;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 300px;
            border: 2px solid #4a90e2;
        }

        .result-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .result-text {
            font-size: 18px;
            margin-bottom: 20px;
            color: white;
        }

        .result-ok {
            background: #4a90e2;
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <span class="balance" id="balance">0⭐</span>
            <span class="user" id="username">Загрузка...</span>
        </div>

        <!-- Экран ИГРА -->
        <div id="pvp-tab" class="tab-content active">
            <div class="wheel-container">
                <div class="wheel" id="wheel"></div>
                <div class="wheel-pointer">▼</div>
            </div>

            <div class="bank">
                <div class="bank-label">БАНК</div>
                <div class="bank-value" id="bank">0⭐</div>
            </div>

            <div class="players-section">
                <div class="players-header">
                    <span>#</span>
                    <span>Цвет</span>
                </div>
                <div id="players-list" class="players-list">
                    <div style="text-align: center; padding: 20px; color: #8e9ab0;">Пока нет ставок</div>
                </div>
            </div>

            <div class="bet-info" id="bet-info">
                <span>Ставка: <span id="bet-amount">0</span>⭐</span>
                <span>Цвет: <span id="bet-color">—</span></span>
            </div>

            <div class="input-group">
                <input type="number" id="bet-input" class="amount-input" placeholder="Введи сумму ставки" min="1" value="10">
            </div>

            <button class="btn btn-primary" id="place-bet">СДЕЛАТЬ СТАВКУ</button>
        </div>

        <!-- Экран ПРОФИЛЬ -->
        <div id="profile-tab" class="tab-content">
            <div class="profile-card">
                <div class="profile-actions">
                    <button class="btn btn-primary" id="deposit-btn">📥 Пополнить</button>
                    <button class="btn btn-secondary" id="withdraw-btn">📤 Вывести</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Баланс</div>
                        <div class="stat-value" id="profile-balance">0⭐</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Игр</div>
                        <div class="stat-value" id="profile-games">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Побед</div>
                        <div class="stat-value" id="profile-wins">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Процент</div>
                        <div class="stat-value" id="profile-winrate">0%</div>
                    </div>
                </div>

                <button class="menu-item" id="partner-btn">👥 Партнёрская программа</button>
                <button class="menu-item" id="support-btn">🆘 Поддержка</button>
                <button class="menu-item" id="promo-btn">🎁 Промокод</button>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <button class="nav-btn active" id="pvp-btn">PVP</button>
            <button class="nav-btn" id="profile-btn">Профиль</button>
        </div>
    </div>

    <!-- Экран ПОПОЛНЕНИЯ -->
    <div id="wallet-screen" class="wallet-screen">
        <div class="wallet-header">
            <button class="back-btn" onclick="hideWallet()">←</button>
            <h2>Кошелек</h2>
        </div>

        <div class="payment-methods">
            <button class="method-btn active" data-method="stars">STARS</button>
            <button class="method-btn" data-method="ton">TON 5%</button>
        </div>

        <div class="amount-section">
            <p class="amount-label">Введите сумму</p>
            <div class="amount-input-wrapper">
                <input type="number" id="wallet-amount" class="amount-input" placeholder="0" min="10" value="100">
                <span class="amount-currency">⭐️</span>
            </div>
        </div>

        <button class="submit-btn" id="wallet-submit">ВВОД</button>
    </div>

    <!-- Экран ВЫВОДА -->
    <div id="withdraw-screen" class="withdraw-screen">
        <div class="wallet-header">
            <button class="back-btn" onclick="hideWithdraw()">←</button>
            <h2>Вывод средств</h2>
        </div>

        <div class="amount-section">
            <p class="amount-label">Сумма вывода (мин. 100⭐)</p>
            <div class="amount-input-wrapper">
                <input type="number" id="withdraw-amount" class="amount-input" placeholder="0" min="100" value="100">
                <span class="amount-currency">⭐️</span>
            </div>
        </div>

        <div class="amount-section">
            <p class="amount-label">Адрес TON кошелька</p>
            <div class="amount-input-wrapper">
                <input type="text" id="wallet-address" class="amount-input" placeholder="UQ...">
            </div>
        </div>

        <button class="submit-btn" id="withdraw-submit">ВЫВЕСТИ</button>
    </div>

    <script>
        // Ждём полной загрузки DOM перед назначением обработчиков
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM загружен, инициализация...');

            let tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // ===== КОНФИГУРАЦИЯ =====
            const API_URL = 'http://192.168.1.36:8080';

            // Данные
            let mockData = {
                balance: 0,
                bank: 0,
                players: [],
                wins: 0,
                partnerEarned: 0
            };

            let isSpinning = false;

            // Получаем пользователя
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name || 'Игрок';
            } else {
                document.getElementById('username').innerText = 'Тестовый режим';
            }

            // ===== ФУНКЦИЯ ПОПОЛНЕНИЯ =====
            async function processDeposit(amount) {
                try {
                    console.log('processDeposit вызвана, amount =', amount);

                    const response = await fetch(`${API_URL}/api/create-invoice`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ amount: amount })
                    });

                    console.log('Статус ответа:', response.status);
                    const data = await response.json();
                    console.log('Данные ответа:', data);

                    if (!data.success) {
                        tg.showAlert('❌ Ошибка создания платежа');
                        return;
                    }

                    tg.openInvoice(data.link, function(status) {
                        console.log('Статус оплаты:', status);
                        if (status === 'paid') {
                            mockData.balance += amount;
                            updateUI();
                            tg.showPopup({
                                title: '✅ Успешно',
                                message: `Пополнено ${amount}⭐`,
                                buttons: [{ type: 'ok' }]
                            });
                        } else if (status === 'failed') {
                            tg.showAlert('❌ Ошибка оплаты');
                        } else if (status === 'cancelled') {
                            tg.showAlert('❌ Платеж отменен');
                        }
                    });

                } catch (error) {
                    console.error('Ошибка:', error);
                    tg.showAlert('❌ Ошибка соединения с сервером');
                }
            }

            // ===== ФУНКЦИИ ОБНОВЛЕНИЯ =====
            function updateUI() {
                document.getElementById('balance').innerText = mockData.balance + '⭐';
                document.getElementById('profile-balance').innerText = mockData.balance + '⭐';
                document.getElementById('bank').innerText = mockData.bank + '⭐';
                document.getElementById('profile-games').innerText = mockData.players.length;
                document.getElementById('profile-wins').innerText = mockData.wins;
                const winrate = mockData.players.length > 0 ? ((mockData.wins / mockData.players.length) * 100).toFixed(1) : 0;
                document.getElementById('profile-winrate').innerText = winrate + '%';

                const playersList = document.getElementById('players-list');
                if (mockData.players.length === 0) {
                    playersList.innerHTML = '<div style="text-align: center; padding: 20px; color: #8e9ab0;">Пока нет ставок</div>';
                } else {
                    let html = '';
                    mockData.players.forEach((player, index) => {
                        html += `
                            <div class="player-item ${player.isYou ? 'you' : ''}">
                                <span>#${index + 1}</span>
                                <span>${player.color}</span>
                            </div>
                        `;
                    });
                    playersList.innerHTML = html;
                }
            }

            // ===== НАЗНАЧЕНИЕ ОБРАБОТЧИКОВ =====

            // Переключение вкладок
            const pvpBtn = document.getElementById('pvp-btn');
            const profileBtn = document.getElementById('profile-btn');
            const pvpTab = document.getElementById('pvp-tab');
            const profileTab = document.getElementById('profile-tab');

            if (pvpBtn) {
                pvpBtn.addEventListener('click', () => {
                    pvpTab.classList.add('active');
                    profileTab.classList.remove('active');
                    pvpBtn.classList.add('active');
                    profileBtn.classList.remove('active');
                });
            }

            if (profileBtn) {
                profileBtn.addEventListener('click', () => {
                    profileTab.classList.add('active');
                    pvpTab.classList.remove('active');
                    profileBtn.classList.add('active');
                    pvpBtn.classList.remove('active');
                });
            }

            // Экран пополнения
            const walletScreen = document.getElementById('wallet-screen');
            const depositBtn = document.getElementById('deposit-btn');

            if (depositBtn) {
                depositBtn.addEventListener('click', () => {
                    console.log('Кнопка пополнения нажата');
                    walletScreen.style.display = 'flex';
                });
            } else {
                console.error('Кнопка deposit-btn не найдена!');
            }

            window.hideWallet = function() {
                walletScreen.style.display = 'none';
            };

            // Выбор метода оплаты
            document.querySelectorAll('.method-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });

            // Кнопка ВВОД (пополнение)
            const walletSubmit = document.getElementById('wallet-submit');
            if (walletSubmit) {
                walletSubmit.addEventListener('click', async () => {
                    const amount = parseInt(document.getElementById('wallet-amount').value);

                    if (!amount || amount < 10) {
                        tg.showAlert('❌ Минимальная сумма: 10⭐');
                        return;
                    }

                    await processDeposit(amount);
                    hideWallet();
                });
            }

            // Экран вывода
            const withdrawScreen = document.getElementById('withdraw-screen');
            const withdrawBtn = document.getElementById('withdraw-btn');

            if (withdrawBtn) {
                withdrawBtn.addEventListener('click', () => {
                    console.log('Кнопка вывода нажата');
                    withdrawScreen.style.display = 'flex';
                });
            }

            window.hideWithdraw = function() {
                withdrawScreen.style.display = 'none';
            };

            // Кнопка ВЫВЕСТИ
            const withdrawSubmit = document.getElementById('withdraw-submit');
            if (withdrawSubmit) {
                withdrawSubmit.addEventListener('click', () => {
                    const amount = parseInt(document.getElementById('withdraw-amount').value);
                    const wallet = document.getElementById('wallet-address').value;

                    if (!amount || amount < 100) {
                        tg.showAlert('❌ Минимальная сумма: 100⭐');
                        return;
                    }

                    if (!wallet || wallet.length < 10) {
                        tg.showAlert('❌ Введите корректный адрес кошелька');
                        return;
                    }

                    if (amount > mockData.balance) {
                        tg.showAlert('❌ Недостаточно средств');
                        return;
                    }

                    tg.showPopup({
                        title: '✅ Заявка создана',
                        message: `Заявка на вывод ${amount}⭐ отправлена администратору`,
                        buttons: [{ type: 'ok' }]
                    });

                    mockData.balance -= amount;
                    updateUI();
                    hideWithdraw();
                });
            }

            // Партнёрская программа
            const partnerBtn = document.getElementById('partner-btn');
            if (partnerBtn) {
                partnerBtn.addEventListener('click', () => {
                    const userId = tg.initDataUnsafe.user?.id || 0;
                    const refLink = `https://t.me/${tg.initDataUnsafe.user?.username || 'bot'}?start=ref_${userId}`;

                    tg.showPopup({
                        title: '👥 Партнёрская программа',
                        message: `Твоя ссылка:\n${refLink}\n\nПриглашай друзей и получай 10% от их ставок!\n\nТвой доход: ${mockData.partnerEarned}⭐`,
                        buttons: [
                            { type: 'default', text: '📋 Копировать' },
                            { type: 'ok', text: 'OK' }
                        ]
                    }, (btnId) => {
                        if (btnId === '📋 Копировать') {
                            navigator.clipboard.writeText(refLink);
                            tg.showAlert('✅ Ссылка скопирована!');
                        }
                    });
                });
            }

            // Поддержка
            const supportBtn = document.getElementById('support-btn');
            if (supportBtn) {
                supportBtn.addEventListener('click', () => {
                    tg.showPopup({
                        title: '🆘 Поддержка',
                        message: 'По всем вопросам обращайтесь к @support_bot',
                        buttons: [{ type: 'ok' }]
                    });
                });
            }

            // Промокод
            const promoBtn = document.getElementById('promo-btn');
            if (promoBtn) {
                promoBtn.addEventListener('click', () => {
                    const promo = prompt('Введите промокод:');
                    if (promo) {
                        if (promo.toLowerCase() === 'arena') {
                            mockData.balance += 50;
                            updateUI();
                            tg.showAlert('✅ Промокод активирован! Получено 50⭐');
                        } else {
                            tg.showAlert('❌ Неверный промокод');
                        }
                    }
                });
            }

            // Крутить рулетку
            function spinWheel() {
                if (isSpinning) return;
                isSpinning = true;

                const wheel = document.getElementById('wheel');
                const spins = 8 + Math.floor(Math.random() * 5);
                const totalAngle = spins * 360;

                wheel.style.transition = 'transform 6s cubic-bezier(0.25, 0.1, 0.15, 1)';
                wheel.style.transform = `rotate(${totalAngle}deg)`;

                setTimeout(() => {
                    if (mockData.players.length > 0) {
                        const total = mockData.players.reduce((sum, p) => sum + p.amount, 0);
                        const random = Math.random() * total;

                        let cumulative = 0;
                        let winner = null;
                        for (const player of mockData.players) {
                            cumulative += player.amount;
                            if (random <= cumulative) {
                                winner = player;
                                break;
                            }
                        }

                        if (winner) {
                            if (winner.isYou) {
                                mockData.wins++;
                                mockData.balance += mockData.bank;
                                mockData.partnerEarned += mockData.bank * 0.1;
                            }

                            const popup = document.createElement('div');
                            popup.className = 'result-popup';
                            popup.innerHTML = `
                                <div class="result-content">
                                    <div class="result-title">🏆 ПОБЕДИТЕЛЬ</div>
                                    <div class="result-text">${winner.color}</div>
                                    <div class="result-text">${winner.amount}⭐</div>
                                    <button class="result-ok" onclick="this.parentElement.parentElement.remove()">OK</button>
                                </div>
                            `;
                            document.body.appendChild(popup);
                            popup.style.display = 'flex';

                            if (tg.HapticFeedback) {
                                tg.HapticFeedback.notification('success');
                            }
                        }
                    }

                    isSpinning = false;
                    updateUI();
                }, 6000);
            }

            // Кнопка СДЕЛАТЬ СТАВКУ
            const placeBetBtn = document.getElementById('place-bet');
            if (placeBetBtn) {
                placeBetBtn.addEventListener('click', () => {
                    const amount = parseInt(document.getElementById('bet-input').value);

                    if (!amount || amount <= 0) {
                        tg.showAlert('❌ Введи сумму ставки');
                        return;
                    }

                    if (amount > mockData.balance) {
                        tg.showAlert('❌ Недостаточно средств');
                        return;
                    }

                    const colors = ['🔴 Красный', '⚫️ Черный', '🟢 Зеленый'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];

                    const newPlayer = {
                        color: randomColor,
                        amount: amount,
                        isYou: true
                    };
                    mockData.players.push(newPlayer);
                    mockData.bank += amount;
                    mockData.balance -= amount;

                    document.getElementById('bet-info').style.display = 'flex';
                    document.getElementById('bet-amount').innerText = amount;
                    document.getElementById('bet-color').innerText = randomColor;

                    updateUI();
                    spinWheel();
                });
            }

            // Инициализация
            updateUI();
            console.log('Инициализация завершена, кнопка deposit-btn:', document.getElementById('deposit-btn'));
        });
    </script>
</body>
</html>
