<!DOCTYPE html>
<html>
<head>
    <title>Stars Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <button onclick="testPayment()">Тест оплаты 100⭐</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();

        async function testPayment() {
            try {
                const response = await fetch('http://192.168.1.36:8080/api/create-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: 100 })
                });

                const data = await response.json();
                if (data.success) {
                    tg.openInvoice(data.link, function(status) {
                        alert('Статус: ' + status);
                    });
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (e) {
                alert('Ошибка соединения: ' + e);
            }
        }
    </script>
</body>
</html>
